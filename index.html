<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Preview</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Remix Icon (obligatorio por directiva de sistema) -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        /* RESET BÁSICO */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #181B1F;
            -webkit-font-smoothing: antialiased;
            /* Padding inicial para que la vista no esté pegada al borde superior del viewport */
            padding-top: 96px; 
            padding-bottom: 96px;
        }

        /* ESTRUCTURA GENERAL */
        .main-container {
            width: 100%;
            margin: 0 auto;
        }

        @media (min-width: 1024px) {
            .main-container {
                max-width: 1200px;
                margin: 0 auto;
            }
        }

        /* ESTRUCTURA DEL HERO */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            gap: 20px;
            width: 699px;
            height: 258px;
            margin: 0 auto;
        }

        /* A) Icon Name Container */
        .hero__identity {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 0;
            gap: 8px;
            width: 194px;
            height: 16px;
        }

        /* A.1) Icon Container */
        .hero__identity-icon {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            padding: 0;
            gap: 10px;
            width: 16px;
            height: 16px;
            background: #FFFFFF;
            border-radius: 3px;
        }

        .hero__identity-icon i {
            color: #0A66C2;
            font-size: 14px;
            line-height: 1;
        }

        /* A.2) Name */
        .hero__identity-name {
            width: 170px;
            height: 16px;
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-weight: 500;
            font-size: 16px;
            line-height: 16px;
            color: #E9EDF2;
            text-decoration: none;
        }

        .hero__identity-name:hover {
            color: #FFFFFF;
        }

        /* B) Title */
        .hero__title {
            width: 593px;
            height: 138px;
            font-family: 'Georgia', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 32px;
            line-height: 46px;
            text-align: center;
            letter-spacing: -1.2px;
            color: #FFFFFF;
        }

        .hero__title s {
            color: #BEC5CC;
        }

        /* C) Subtitle */
        .hero__subtitle {
            width: 363px;
            height: 64px;
            font-family: 'Geist', sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 18px;
            line-height: 32px;
            text-align: center;
            color: #BEC5CC;
        }

        /* SECCIÓN WORK GRID */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 96px; /* TOKEN PENDIENTE: ~96-120px */
            width: 100%;
        }

        .work-card {
            border-radius: 20px; /* TOKEN PENDIENTE: ~20-24px */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            aspect-ratio: 600 / 504; 
            
            /* INTERACCIÓN — HOVER DE TARJETAS */
            transition: transform 300ms cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        @media (hover: hover) and (pointer: fine) {
            .work-card:hover {
                transform: translateY(-6px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .work-card {
                transition: none;
            }
            .work-card:hover {
                transform: none;
            }
        }

        .work-card--ciarem {
            background-image: url('https://cdn.prod.website-files.com/69ead29f89acb48c62e80c52/69eae08b13c83de41530dddc_Left%20Image%20Container%20soft.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
        }

        .work-card--treble {
            background-image: url('https://cdn.prod.website-files.com/69ead29f89acb48c62e80c52/69eae0940b48d86b4ba3bcbf_Right%20Image%20Container%20soft.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
        }

        /* Card Header */
        .work-card__header {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            padding-top: 32px; /* TOKEN PENDIENTE: ~32-40px */
            padding-left: 32px; /* TOKEN PENDIENTE: ~32-40px */
        }

        .work-card__logo-img {
            display: block;
            height: 30px;
            width: auto;
        }

        /* RESPONSIVE */
        @media (max-width: 767px) {
            .main-container {
                padding-left: 24px; 
                padding-right: 24px;
            }
            .hero {
                width: 100%;
                max-width: 699px;
                height: auto;
                padding-left: 20px;
                padding-right: 20px;
            }
            .hero__title {
                width: 100%;
                max-width: 593px;
                height: auto;
                /* El titular reduce con clamp, manteniendo proporción */
                font-size: clamp(24px, 6vw, 32px);
                line-height: 1.4;
            }
            .hero__subtitle {
                width: 100%;
                max-width: 363px;
                height: auto;
            }
            
            .work-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            
            .work-card {
                 aspect-ratio: auto;
                 min-height: 500px; /* Asegura un buen canvas en mobile */
            }
        }
    </style>
    <script>
        if (sessionStorage.getItem("portfolio-unlocked") !== "true") {
            document.documentElement.classList.add('locked');
        }
    </script>
    <style>
        html.locked body > *:not(script):not(#lock-screen-root) {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="main-container">
        
        <header>
            <section class="hero">
                
                <div class="hero__identity">
                    <div class="hero__identity-icon">
                        <img src="https://cdn.prod.website-files.com/69ead29f89acb48c62e80c52/69eae210b830a1bd43845b2a_linkedin.svg" alt="LinkedIn logo" style="width: 16px; height: 16px;" />
                    </div>
                    <a href="https://www.linkedin.com/in/rodrigotorrega/" target="_blank" rel="noopener" class="hero__identity-name">Rodrigo Torres Ortega</a>
                </div>

                <h1 class="hero__title">I'm a <s>Product Designer</s> Startup Product Designer. I build products the real way: shipping, failing, and iterating.</h1>
                
                <p class="hero__subtitle">7 years on early-stage teams where speed and learning are the job.</p>

            </section>
        </header>

        <section class="work-grid">
            
            <a href="ciarem.html" class="work-card work-card--ciarem">
                <div class="work-card__header">
                    <img src="https://cdn.prod.website-files.com/69ead29f89acb48c62e80c52/69ead9eb62daf5720ada82c3_ciarem__logo__001.svg" alt="ciarem logo" class="work-card__logo-img">
                </div>
            </a>

            <a href="/treble.html" class="work-card work-card--treble">
                <div class="work-card__header">
                    <img src="https://cdn.prod.website-files.com/69ead29f89acb48c62e80c52/69ead9e3b25d4dce72c8a6ad_treble__logo__001.svg" alt="treble.ai logo" class="work-card__logo-img">
                </div>
            </a>

        </section>

    </div>
    <script type="module" src="/src/lock-screen.tsx"></script>
</body>
</html>
